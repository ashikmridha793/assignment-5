<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5 Home page</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">

</head>

<body>
    <section class="sticky top-0 z-50">
        <div class="navbar bg-base-100 shadow-sm ">
            <div class="flex-1 flex items-center gap-2">
                <img class="w-10" src="./assets/github-logo.png" alt="">
                <h2 class="font-bold text-xl ">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2 items-center">
                <input id="search-input" type="text" placeholder="Search"
                    class="input input-bordered w-24 hidden md:block md:w-auto" />
                <span class="md:hidden mr-5"><i class="fa-solid fa-magnifying-glass "></i></span>
                <button class="btn btn-active btn-primary hidden md:inline-flex"> + New Issue</button>
            </div>
        </div>
    </section>
    <main>

        <section class="w-10/12 md:w-10/12 lg:w-9/12  mx-auto mt-10">
            <div class="gap-4 flex flex-wrap justify-center border border-gray-200 rounded-lg overflow-hidden bg-white w-full max-w-xs md:max-w-md mx-auto mb-8">

                <button id="all-issues" class="flex-1 px-4 py-2 text-xs md:text-sm font-medium border-r border bg-gray-200 focus:bg-indigo-600 focus:text-white transition-colors">All</button>

                <button id="open-issues" class="flex-1 px-4 py-2 text-xs md:text-sm font-medium border-r border bg-gray-200 focus:bg-indigo-600 focus:text-white transition-colors">Open</button>

                <button id="closed-issues" class="flex-1 px-4 py-2 text-xs md:text-sm font-medium border bg-gray-200 focus:bg-indigo-600 focus:text-white transition-colors">Closed</button>
            </div>

            <div class=" md:flex items-center justify-between w-100% my-5 shadow-sm p-3 rounded-md space-x-3">
                <div class="flex items-center gap-2">
                    <div class="bg-gray-300 w-12 h-12 rounded-full flex items-center justify-center font-bold">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-bold text-xl ml-3"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-[#646464] text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 mt-5 md:mt-0">
                    <p class="font-semibold text-lg"><i class="fa-solid fa-circle text-green-500"></i> Open</p>
                    <p class="font-semibold text-lg"><i class="fa-solid fa-circle text-purple-500"></i> Closed</p>
                </div>
            </div>
        </section>

        <section id="container"
            class="w-10/12 md:w-10/12 lg:w-9/12 mx-auto bg-gray-50 p-4 md:p-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 min-h-[400px]">
        </section>

    </main>

    <input type="checkbox" id="issue-modal" class="modal-toggle" />
    <div class="modal">
        <div class="modal-box max-w-2xl p-0 overflow-hidden ">
            <div class="p-6 border-b border-gray-100">
                <h3 id="modal-title" class="font-bold text-lg"></h3>
                <div class="flex items-center gap-2 mb-4">
                    <span id="modal-status-badge" class="badge badge-success text-white">Opened</span>
                    <span class="text-gray-400 text-sm"> . Opened by <span id="modal-author" class="font-medium text-gray-700"></span> . <span id="modal-created"></span> </span>
                </div>

                <div class="flex gap-2 mb-4">
                    <span id="modal-label" class="badge badge-outline badge-error uppercase text-[10px] font-bold"></span>
                    <span class="badge badge-outline badge-warning uppercase text-[10px] font-bold">HELP WANTED</span>
                </div>

                <p id="modal-description" class="text-gray-600 leading-relaxed mb-8"></p>
            </div>
            
            <div class="p-6 bg-gray-50/50">
                <div class="flex flex-wrap justify-around gap-10">
                    <div>
                        <p class="text-gray-400 text-sm mb-1">Assignee:</p>
                        <p id="modal-assignee" class="font-bold text-gray-800 text-lg"></p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm mb-1">Priority::</p>
                        <span id="modal-priority" class="font-bold text-white badge badge-error h-8 px-4"></span>
                    </div>
                </div>
            </div>
            <div class="modal-action p-4 bg-white flex justify-end">
                <label for="issue-modal" class="btn btn-primary border-none px-8">Close</label>
            </div>
        </div>
    </div>



    <script src="./script/home.js"></script>
</body>

</html>
